<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trasferte VGC 2027</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
  :root {
    color-scheme: light;
    --page:        #f9f9f7;
    --surface:     #fcfcfb;
    --ink:         #0b0b0b;
    --ink-2:       #52514e;
    --muted:       #898781;
    --hairline:    #e1e0d9;
    --border:      rgba(11,11,11,.10);
    --accent:      #2a78d6;
    --good:        #006300;
    --bad:         #d03b3b;
    --warn-bg:     #fdf3e0;
    --warn-ink:    #8a5a00;
    --badge-int-bg: #fbe6dc; --badge-int-ink: #a33c12;
    --badge-reg-bg: #dfeafa; --badge-reg-ink: #1c5cab;
    --badge-spe-bg: #e6e2f8; --badge-spe-ink: #4a3aa7;
    --row-hl:      #eef5fd;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page:        #0d0d0d;
      --surface:     #1a1a19;
      --ink:         #ffffff;
      --ink-2:       #c3c2b7;
      --muted:       #898781;
      --hairline:    #2c2c2a;
      --border:      rgba(255,255,255,.10);
      --accent:      #3987e5;
      --good:        #0ca30c;
      --bad:         #e66767;
      --warn-bg:     #3a2d10;
      --warn-ink:    #f0c979;
      --badge-int-bg: #47231a; --badge-int-ink: #f0a184;
      --badge-reg-bg: #17293f; --badge-reg-ink: #86b6ef;
      --badge-spe-bg: #292345; --badge-spe-ink: #b0a8ef;
      --row-hl:      #1e2a38;
    }
  }
  @supports (interpolate-size: allow-keywords) {
    :root { interpolate-size: allow-keywords; }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--page);
    color: var(--ink);
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 16px 12px 48px; }

  .head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  header h1 { font-size: 1.6rem; letter-spacing: -.01em; }
  header .sub { color: var(--ink-2); font-size: .9rem; margin-top: 4px; }
  .lang { display: flex; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; flex: none; }
  .lang button {
    font: inherit; font-size: .78rem; font-weight: 650; padding: 5px 12px;
    border: 0; background: var(--surface); color: var(--ink-2); cursor: pointer;
  }
  .lang button.active { background: var(--accent); color: #fff; }

  .banner {
    margin: 12px 0 0; padding: 10px 14px; border-radius: 10px;
    background: var(--warn-bg); color: var(--warn-ink); font-size: .9rem;
  }

  /* barra filtri sticky */
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    margin: 14px -12px 10px; padding: 10px 12px;
    background: var(--page);
    background: color-mix(in srgb, var(--page) 84%, transparent);
    -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--hairline);
  }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; }
  .filters button, .chip-toggle {
    border: 1px solid var(--border); background: var(--surface); color: var(--ink-2);
    border-radius: 999px; padding: 6px 14px; font: inherit; font-size: .85rem; cursor: pointer;
  }
  .filters button.active, .chip-toggle.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .member-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 8px; font-size: .85rem; color: var(--ink-2); }
  .member-row select {
    font: inherit; font-size: .85rem; color: var(--ink);
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 6px 10px; max-width: 230px; flex: 0 1 auto;
  }

  /* riga riepilogo + stat tiles */
  #summary { margin-bottom: 20px; }
  .sumline { color: var(--ink-2); font-size: .85rem; margin-bottom: 8px; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
  .tile {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px;
  }
  .tile .k { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; }
  .tile .v { font-size: 1.45rem; font-weight: 720; margin-top: 2px; letter-spacing: -.01em; }
  .tile .n { color: var(--muted); font-size: .74rem; margin-top: 2px; }

  /* card evento */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; margin-bottom: 16px;
    transition: box-shadow .18s ease, transform .18s ease, border-color .18s ease;
  }
  @media (hover: hover) {
    .card:hover { box-shadow: 0 6px 22px rgba(0,0,0,.10); transform: translateY(-1px); }
  }
  .card-head { display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline; justify-content: space-between; }
  .card-head h2 { font-size: 1.12rem; flex: 1 1 auto; min-width: 60%; }
  .badge {
    font-size: .72rem; font-weight: 650; padding: 3px 10px; border-radius: 999px; white-space: nowrap;
  }
  .badge.international { background: var(--badge-int-bg); color: var(--badge-int-ink); }
  .badge.regional      { background: var(--badge-reg-bg); color: var(--badge-reg-ink); }
  .badge.special       { background: var(--badge-spe-bg); color: var(--badge-spe-ink); }
  .badge.next          { background: var(--accent); color: #fff; }

  .meta { color: var(--ink-2); font-size: .88rem; margin-top: 6px; }
  .meta div { margin-top: 2px; }
  .venue-warn { color: var(--warn-ink); font-size: .82rem; }

  .estimate {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    margin: 14px 0; padding: 12px 14px; border-radius: 10px;
    border: 1px dashed var(--hairline);
  }
  .estimate .big { font-size: 2.2rem; font-weight: 750; line-height: 1.1; letter-spacing: -.01em; }
  .estimate .lbl { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; width: 100%; }
  .estimate .split { color: var(--ink-2); font-size: .85rem; }

  .delta { font-size: .8rem; font-weight: 650; white-space: nowrap; }
  .delta.down { color: var(--good); }
  .delta.up   { color: var(--bad); }

  .who { font-size: .88rem; margin-top: 8px; }
  .who .chip {
    display: inline-block; background: var(--page); border: 1px solid var(--hairline);
    border-radius: 999px; padding: 2px 10px; margin: 2px 4px 2px 0; font-size: .8rem;
  }
  .who .none { color: var(--muted); font-style: italic; }
  .who .chip.me { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 650; }

  /* spoiler voli da aeroporti alternativi */
  details.extra-origin {
    margin-top: 10px; border-radius: 10px;
    border: 1px solid var(--hairline); border-left: 3px solid var(--badge-spe-ink);
  }
  details.extra-origin summary {
    list-style: none; cursor: pointer; padding: 9px 12px;
    font-size: .8rem; font-weight: 650; color: var(--ink-2);
    display: flex; align-items: center; gap: 8px;
  }
  details.extra-origin summary::-webkit-details-marker { display: none; }
  details.extra-origin .chev { display: inline-block; transition: transform .2s ease; transform: rotate(-90deg); }
  details.extra-origin[open] .chev { transform: rotate(0deg); }
  details.extra-origin .extra-body { padding: 0 12px 10px; }
  details.extra-origin::details-content {
    height: 0; overflow: clip;
    transition: height .25s ease, content-visibility .25s allow-discrete;
  }
  details.extra-origin[open]::details-content { height: auto; }
  details.extra-origin.me { border-left-color: var(--accent); background: var(--row-hl); }
  details.extra-origin table { font-size: .8rem; min-width: 480px; }
  .extra-none { color: var(--muted); font-size: .8rem; margin-top: 8px; }

  h3.sec { font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 16px 0 6px; }
  .rtnote { color: var(--muted); font-size: .74rem; margin: -2px 0 6px; }
  h4.leg { font-size: .76rem; font-weight: 650; color: var(--ink-2); margin: 6px 0 5px; }
  .plus1 { color: var(--muted); font-size: .78em; white-space: nowrap; }
  /* biglietto: andata + ritorno come unica unità */
  .ticket { border: 1px solid var(--hairline); border-radius: 12px; padding: 8px 12px 12px; }
  .ticket .legsep { border-top: 1px dashed var(--hairline); margin: 12px 0 4px; } /* "strappo" del biglietto */
  details.extra-origin .ticket { border: 0; padding: 0; } /* dentro lo spoiler il bordo c'è già */

  /* tabelle: scroll orizzontale dentro la card, mai la pagina */
  .tblwrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--hairline); border-radius: 10px; }
  table { border-collapse: collapse; width: 100%; min-width: 520px; font-size: .84rem; }
  th, td { text-align: left; padding: 7px 10px; white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; font-size: .72rem; text-transform: uppercase; letter-spacing: .03em;
       border-bottom: 1px solid var(--hairline); }
  tbody tr + tr td { border-top: 1px solid var(--hairline); }
  td.num { font-variant-numeric: tabular-nums; }
  tr.best { background: var(--row-hl); }
  tr.best td:first-child::before { content: "★ "; color: var(--accent); }
  td a { color: var(--accent); text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .mdeal, .gdeal {
    font-size: .68rem; font-weight: 650; white-space: nowrap;
    border-radius: 999px; padding: 1px 8px; margin-left: 6px;
  }
  .mdeal, .gdeal, .mubadge { display: inline-block; }
  .mdeal { background: var(--badge-reg-bg); color: var(--badge-reg-ink); }
  .gdeal { background: #003580; color: #fff; } /* blu Booking */
  .mubadge { background: var(--badge-spe-bg); color: var(--badge-spe-ink); }
  .unit { color: var(--muted); font-size: .74rem; margin-top: 1px; white-space: normal; }

  .noprices { color: var(--ink-2); font-size: .9rem; margin: 10px 0; }
  .linkrow { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .linkrow a {
    display: inline-block; padding: 8px 14px; border-radius: 10px; font-size: .85rem;
    border: 1px solid var(--border); color: var(--accent); text-decoration: none; font-weight: 600;
  }
  .linkrow a:hover { border-color: var(--accent); }

  .errors { margin-top: 14px; padding-top: 8px; border-top: 1px solid var(--hairline);
            color: var(--muted); font-size: .76rem; }

  .empty, .fatal { text-align: center; color: var(--muted); padding: 40px 0; }
  .foot { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 28px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="head-row">
      <h1 id="title">Trasferte VGC 2027</h1>
      <div class="lang" id="lang">
        <button data-l="it" class="active">IT</button><button data-l="en">EN</button>
      </div>
    </div>
    <div class="sub" id="subheader"></div>
  </header>

  <div class="banner" id="banner" hidden></div>

  <div class="toolbar">
    <nav class="filters" id="filters">
      <button data-f="all" class="active"></button>
      <button data-f="intl"></button>
      <button data-f="eu"></button>
      <button data-f="booked"></button>
    </nav>
    <div class="member-row">
      <label for="member" id="member-label"></label>
      <select id="member"><option value=""></option></select>
      <button class="chip-toggle" id="mobile-toggle"></button>
      <button class="chip-toggle" id="genius-toggle"></button>
    </div>
  </div>

  <section id="summary"></section>
  <main id="cards"></main>
  <footer class="foot" id="footer"></footer>
</div>

<script>
"use strict";
(() => {
  // ---- i18n ----
  const I18N = {
    it: {
      locale: "it-IT",
      title: "Trasferte VGC 2027",
      updated: (d, o) => `aggiornato il ${d} · partenza da ${o}`,
      sampleBanner: "⚠ Stai vedendo dati di esempio: prices.json non è ancora disponibile.",
      fAll: "Tutti", fIntl: "Internazionali", fEu: "Europei", fBooked: "Solo con prenotati",
      viewAs: "Vedi come…", everyone: "Tutti",
      mobileChip: "📱 Solo offerte mobile",
      geniusChip: "Genius", geniusDeal: "Genius",
      noGeniusDeals: "nessuna offerta Genius trovata",
      tileFlights: "Solo voli", tileStays: "Solo alloggi", tileTotal: "Voli + alloggi",
      ofEvents: n => `su ${n} ${n === 1 ? "evento" : "eventi"} con dati`,
      eventsWord: n => n === 1 ? "evento" : "eventi", nextWord: "prossimo",
      types: { international: "Internazionale", regional: "Regionale", special: "Speciale" },
      nextBadge: "Prossimo evento",
      venueTBC: "sede da confermare",
      nightsWord: n => n === 1 ? "notte" : "notti",
      booked: n => `Prenotati (${n}):`,
      noneBooked: n => `Nessuno prenotato — ricerca base per ${n} persone`,
      estimateLbl: "Stima a testa", forName: n => ` per ${n}`,
      flightWord: "volo", stayWord: "alloggio", fromWord: "da",
      deltaFlight: "volo", deltaNight: "notte",
      deltaTip: "variazione dall'ultimo aggiornamento",
      secFlights: "Voli", secStays: "Alloggi",
      outbound: "Andata", inbound: "Ritorno",
      returnNote: "orari disponibili per il rientro — il prezzo è incluso nel totale A/R",
      returnHint: g => `opzioni di ritorno su ${g}`,
      thAirline: "Compagnia", thTimes: "Partenza → Arrivo", thStops: "Scali",
      thDur: "Durata", thPricePP: "Totale A/R p.p.",
      direct: "Diretto", stopsOf: n => n + (n === 1 ? " scalo" : " scali"),
      thSource: "Fonte", thStay: "Alloggio", thNight: "€/notte p.p.", thTotal: "Totale",
      thReviews: "Recensioni", thDist: "Distanza", thCancel: "Cancellazione",
      yes: "Sì", no: "No", toVerify: "Da verificare", openLink: "apri",
      mobileDeal: "Offerta mobile",
      multiUnit: "Più unità",
      noMobileDeals: "nessuna offerta mobile trovata",
      noPrices: "Prezzi non ancora disponibili.",
      searchBooking: "Cerca su Booking", searchAirbnb: "Cerca su Airbnb", searchFlights: "Cerca su Google Flights",
      flightsFrom: "Voli da", forWord: "per",
      extraNone: a => `voli da ${a} non disponibili`,
      errorsLbl: "Avvisi raccolta dati:",
      emptyFilter: "Nessun evento per questo filtro.",
      footer: "Aggiornato automaticamente ogni notte · dati Booking/Airbnb/Google Flights",
      fatal: m => `Impossibile caricare i dati (${m}).`,
      airports: { ROM: "Roma", FCO: "Roma", CIA: "Roma", LYS: "Lione", MIL: "Milano", LON: "Londra", FRA: "Francoforte" },
    },
    en: {
      locale: "en-GB",
      title: "VGC 2027 Trips",
      updated: (d, o) => `updated on ${d} · departing from ${o}`,
      sampleBanner: "⚠ You are viewing sample data: prices.json is not available yet.",
      fAll: "All", fIntl: "Internationals", fEu: "Europeans", fBooked: "Only with bookings",
      viewAs: "View as…", everyone: "Everyone",
      mobileChip: "📱 Mobile deals only",
      geniusChip: "Genius", geniusDeal: "Genius",
      noGeniusDeals: "no Genius deals found",
      tileFlights: "Flights only", tileStays: "Stays only", tileTotal: "Flights + stays",
      ofEvents: n => `across ${n} ${n === 1 ? "event" : "events"} with data`,
      eventsWord: n => n === 1 ? "event" : "events", nextWord: "next",
      types: { international: "International", regional: "Regional", special: "Special" },
      nextBadge: "Next event",
      venueTBC: "venue to be confirmed",
      nightsWord: n => n === 1 ? "night" : "nights",
      booked: n => `Booked (${n}):`,
      noneBooked: n => `No one booked — base search for ${n} people`,
      estimateLbl: "Estimate per person", forName: n => ` for ${n}`,
      flightWord: "flight", stayWord: "stay", fromWord: "from",
      deltaFlight: "flight", deltaNight: "night",
      deltaTip: "change since the last update",
      secFlights: "Flights", secStays: "Stays",
      outbound: "Outbound", inbound: "Return",
      returnNote: "available return times — price included in the round-trip total",
      returnHint: g => `return options on ${g}`,
      thAirline: "Airline", thTimes: "Departure → Arrival", thStops: "Stops",
      thDur: "Duration", thPricePP: "Round-trip p.p.",
      direct: "Direct", stopsOf: n => n + (n === 1 ? " stop" : " stops"),
      thSource: "Source", thStay: "Stay", thNight: "€/night pp", thTotal: "Total",
      thReviews: "Reviews", thDist: "Distance", thCancel: "Cancellation",
      yes: "Yes", no: "No", toVerify: "To verify", openLink: "open",
      mobileDeal: "Mobile deal",
      multiUnit: "Multiple units",
      noMobileDeals: "no mobile deals found",
      noPrices: "Prices not yet available.",
      searchBooking: "Search on Booking", searchAirbnb: "Search on Airbnb", searchFlights: "Search on Google Flights",
      flightsFrom: "Flights from", forWord: "for",
      extraNone: a => `flights from ${a} not available`,
      errorsLbl: "Data collection warnings:",
      emptyFilter: "No events for this filter.",
      footer: "Updated automatically every night · data from Booking/Airbnb/Google Flights",
      fatal: m => `Could not load data (${m}).`,
      airports: { ROM: "Rome", FCO: "Rome", CIA: "Rome", LYS: "Lyon", MIL: "Milan", LON: "London", FRA: "Frankfurt" },
    },
  };

  // team completo (i nomi nei participants si aggiungono dinamicamente)
  const TEAM = ["Alessio", "Federico", "Alessandro B", "Alessandro S", "Jean",
    "Francesco M", "Francesco N", "Nicolò", "Stefano", "Roberto",
    "Andrea", "Maurizio", "Giovanni", "Antonio"];
  const LS_MEMBER = "vgc2027.member";
  const LS_LANG = "vgc2027.lang";

  // ---- stato ----
  const state = {
    lang: "it", typeFilter: "all", member: "",
    mobileOnly: false, geniusOnly: false,
    events: [], deltas: {}, isSample: false,
    generatedAt: null, origin: "",
  };

  let t = I18N.it, nf0, nf2;
  function setLang(l) {
    state.lang = I18N[l] ? l : "it";
    t = I18N[state.lang];
    nf0 = new Intl.NumberFormat(t.locale, { maximumFractionDigits: 0 });
    nf2 = new Intl.NumberFormat(t.locale, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  setLang("it");

  // ---- formattazione ----
  const euro = v => (v == null || isNaN(v)) ? "—" :
    "€ " + (Number.isInteger(+v) ? nf0.format(v) : nf2.format(v));
  const round2 = v => Math.round(v * 100) / 100;

  const parseDay = s => new Date(s + "T12:00:00"); // evita slittamenti di fuso
  const fmtDay = (d, opts) => d.toLocaleDateString(t.locale, opts || { day: "numeric", month: "short", year: "numeric" });
  function fmtRange(a, b) {
    const d1 = parseDay(a), d2 = parseDay(b);
    if (a === b) return fmtDay(d1);
    if (d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear())
      return d1.getDate() + "–" + fmtDay(d2, { day: "numeric", month: "long", year: "numeric" });
    return fmtDay(d1) + " – " + fmtDay(d2);
  }

  const esc = s => String(s ?? "").replace(/[&<>"']/g,
    c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  const airportLabel = code => t.airports[code] ? `${t.airports[code]} (${code})` : String(code || "—");

  // ---- caricamento dati ----
  async function loadJSON(url) {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error(url + " → " + r.status);
    return r.json();
  }

  // Variazioni rispetto allo snapshot precedente di history.json
  function computeDeltas(history) {
    const snaps = (history && Array.isArray(history.snapshots)) ? [...history.snapshots] : [];
    if (snaps.length < 2) return {};
    snaps.sort((a, b) => (a.date < b.date ? -1 : 1));
    const prev = snaps[snaps.length - 2].events || {};
    const last = snaps[snaps.length - 1].events || {};
    const out = {};
    for (const slug of Object.keys(last)) {
      const p = prev[slug], l = last[slug];
      if (!p || !l) continue;
      const d = {};
      if (typeof l.min_flight_pp === "number" && typeof p.min_flight_pp === "number")
        d.flight = l.min_flight_pp - p.min_flight_pp;
      if (typeof l.min_stay_pp_night === "number" && typeof p.min_stay_pp_night === "number")
        d.stay = l.min_stay_pp_night - p.min_stay_pp_night;
      if (Object.keys(d).length) out[slug] = d;
    }
    return out;
  }

  function deltaChip(diff, label) {
    if (diff == null || Math.abs(diff) < 0.005) return "";
    const up = diff > 0;
    return `<span class="delta ${up ? "up" : "down"}" title="${esc(t.deltaTip)}">
      ${up ? "▲" : "▼"} ${esc(label)} ${euro(Math.abs(diff))}</span>`;
  }

  // ---- stime ----
  function extraOriginFor(ev, member) {
    if (!member) return null;
    return (ev.extra_origins || []).find(o =>
      (o.participants || []).includes(member) && (o.flights || []).length) || null;
  }

  // Stima a testa: volo minimo (da aeroporto alternativo se il membro ne ha uno) + alloggio
  function estimateFor(ev, member) {
    const est = ev.estimate_pp || {};
    const eo = extraOriginFor(ev, member);
    if (!eo) return { flight: est.flight ?? null, stay: est.stay ?? null, total: est.total ?? null, origin: null };
    const flight = Math.min(...eo.flights.map(f => f.price_pp));
    const stay = est.stay ?? null;
    return { flight, stay, total: stay != null ? round2(flight + stay) : null, origin: eo.origin };
  }

  // ---- parsing orari/date dei voli (formato Google Flights, es. "7:10 AM, Thursday, February 18 (FCO→LON)") ----
  const EN_MONTHS = { january: 0, february: 1, march: 2, april: 3, may: 4, june: 5,
    july: 6, august: 7, september: 8, october: 9, november: 10, december: 11 };
  const yearOf = iso => { const y = parseInt(String(iso || "").slice(0, 4), 10); return isNaN(y) ? new Date().getFullYear() : y; };

  // "7:10 AM" → "07:10" quando la lingua è IT; altrimenti (o se non parsabile) com'è
  function fmtTime(s) {
    const str = String(s || "").trim();
    if (state.lang !== "it") return str;
    const m = /^(\d{1,2}):(\d{2})\s*(AM|PM)$/i.exec(str);
    if (!m) return str;
    let h = +m[1] % 12;
    if (/pm/i.test(m[3])) h += 12;
    return String(h).padStart(2, "0") + ":" + m[2];
  }

  // "Thursday, February 18" → data compatta nel locale attivo, es. "gio 18 feb"
  // (l'anno viene dal riferimento evento); se non parsabile, com'è
  function fmtEnDate(s, refIso) {
    const m = /(january|february|march|april|may|june|july|august|september|october|november|december)\s+(\d{1,2})/i
      .exec(String(s || ""));
    if (!m) return String(s || "");
    const d = new Date(yearOf(refIso), EN_MONTHS[m[1].toLowerCase()], +m[2], 12);
    return d.toLocaleDateString(t.locale, { weekday: "short", day: "numeric", month: "short" });
  }

  // scompone departure/arrival in orario, data e tratta; tollera il vecchio formato ("18/02 07:10")
  function parseLeg(f) {
    const dep = String(f.departure || "");
    const routeM = /\(([^)]*→[^)]*)\)\s*$/.exec(dep);
    const route = routeM ? routeM[1] : "";
    const depClean = (routeM ? dep.slice(0, routeM.index) : dep).trim().replace(/,\s*$/, "");
    const ci = depClean.indexOf(",");
    const depTime = (ci >= 0 ? depClean.slice(0, ci) : depClean).trim();
    const depDate = ci >= 0 ? depClean.slice(ci + 1).trim() : "";
    const arrM = /^([^(]*)(?:\(([^)]+)\))?\s*$/.exec(String(f.arrival || ""));
    const arrTime = arrM ? arrM[1].trim() : "";
    const arrDate = arrM && arrM[2] ? arrM[2].trim() : "";
    return { depTime, depDate, arrTime, arrDate, route };
  }

  // ---- render tabelle ----
  // cella "partenza → arrivo" (+ eventuale data di arrivo il giorno dopo, + tratta)
  function timesCell(f, refIso) {
    const L = parseLeg(f);
    if (!L.depTime) return esc(String(f.departure || "—"));
    const arr = L.arrTime ? " → " + esc(fmtTime(L.arrTime)) : "";
    const plus1 = L.arrDate ? ` <span class="plus1">(${esc(fmtEnDate(L.arrDate, refIso))})</span>` : "";
    const route = L.route ? `<div class="unit">${esc(L.route)}</div>` : "";
    return `${esc(fmtTime(L.depTime))}${arr}${plus1}${route}`;
  }

  // withPrice: il prezzo (già totale A/R) compare solo sull'andata
  function flightsTable(flights, refIso, withPrice) {
    const rows = [...flights].sort((a, b) => a.price_pp - b.price_pp).slice(0, 5);
    const best = Math.min(...rows.map(f => f.price_pp));
    return `<div class="tblwrap"><table>
      <thead><tr><th>${t.thAirline}</th><th>${t.thTimes}</th><th>${t.thStops}</th><th>${t.thDur}</th>${withPrice ? `<th>${t.thPricePP}</th>` : ""}</tr></thead>
      <tbody>${rows.map(f => `
        <tr${withPrice && f.price_pp === best ? ' class="best"' : ""}>
          <td>${esc(f.airline)}</td>
          <td>${timesCell(f, refIso)}</td>
          <td>${f.stops === 0 ? t.direct : t.stopsOf(f.stops)}</td>
          <td>${esc(f.duration)}</td>
          ${withPrice ? `<td class="num"><strong>${euro(f.price_pp)}</strong></td>` : ""}
        </tr>`).join("")}
      </tbody></table></div>`;
  }

  // intestazione di tratta ("→ Andata · gio 18 feb"): data dal primo volo, fallback check-in/out
  function legHeading(arrow, label, flights, refIso) {
    const first = flights[0] ? parseLeg(flights[0]) : null;
    const dateTxt = first && first.depDate ? fmtEnDate(first.depDate, refIso) : fmtDay(parseDay(refIso));
    return `<h4 class="leg">${arrow} ${esc(label)} · ${esc(dateTxt)}</h4>`;
  }

  // andata + ritorno come unico "biglietto"; il ritorno non ripete il prezzo
  function legsHtml(flights, returns, ev, links) {
    let h = legHeading("→", t.outbound, flights, ev.check_in) + flightsTable(flights, ev.check_in, true);
    h += '<div class="legsep"></div>';
    if (returns && returns.length) {
      h += legHeading("←", t.inbound, returns, ev.check_out)
        + `<div class="rtnote">${esc(t.returnNote)}</div>`
        + flightsTable(returns, ev.check_out, false);
    } else {
      const gfl = links && links.flights
        ? `<a href="${esc(links.flights)}" target="_blank" rel="noopener">Google Flights</a>` : "Google Flights";
      h += `<div class="extra-none">${t.returnHint(gfl)}</div>`;
    }
    return `<div class="ticket">${h}</div>`;
  }

  function flightsBlock(ev) {
    return `<h3 class="sec">${t.secFlights}</h3>
      ${legsHtml(ev.flights, ev.return_flights, ev, ev.links)}`;
  }

  function cancelLabel(v) {
    if (v === true)  return `<span style="color:var(--good)">${t.yes}</span>`;
    if (v === false) return t.no;
    return `<span style="color:var(--muted)">${t.toVerify}</span>`;
  }

  function staysTable(stays) {
    const rows = [...stays].sort((a, b) => a.per_person_night - b.per_person_night).slice(0, 6);
    const best = Math.min(...rows.map(s => s.per_person_night));
    return `<div class="tblwrap"><table>
      <thead><tr><th>${t.thSource}</th><th>${t.thStay}</th><th>${t.thNight}</th><th>${t.thTotal}</th><th>${t.thReviews}</th><th>${t.thDist}</th><th>${t.thCancel}</th><th></th></tr></thead>
      <tbody>${rows.map(s => `
        <tr${s.per_person_night === best ? ' class="best"' : ""}>
          <td>${esc(s.source)}</td>
          <td style="white-space:normal;min-width:140px">${esc(s.name)}${s.mobile_deal === true ? `<span class="mdeal">📱 ${esc(t.mobileDeal)}</span>` : ""}${s.genius_deal === true ? `<span class="gdeal">${esc(t.geniusDeal)}</span>` : ""}${s.multi_unit === true ? `<span class="mubadge">${esc(t.multiUnit)}</span>` : ""}${s.unit_desc ? `<div class="unit">${esc(s.unit_desc)}</div>` : ""}</td>
          <td class="num"><strong>${euro(s.per_person_night)}</strong></td>
          <td class="num">${euro(s.total_price)}</td>
          <td>${s.review_score != null ? esc(s.review_score) + " (" + nf0.format(s.review_count || 0) + ")" : "—"}</td>
          <td class="num">${s.distance_km != null ? nf2.format(s.distance_km) + " km" : "—"}</td>
          <td>${cancelLabel(s.free_cancellation)}</td>
          <td>${s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">${t.openLink}</a>` : ""}</td>
        </tr>`).join("")}
      </tbody></table></div>`;
  }

  // Sezione alloggi con filtri "solo offerte mobile" / "Genius"
  function staysSection(ev) {
    const all = ev.stays || [];
    if (!all.length) return "";
    const vis = all.filter(s =>
      (!state.mobileOnly || s.mobile_deal === true) &&
      (!state.geniusOnly || s.genius_deal === true));
    const emptyMsg = state.mobileOnly ? t.noMobileDeals : t.noGeniusDeals;
    const body = vis.length ? staysTable(vis) : `<div class="noprices">${esc(emptyMsg)}</div>`;
    return `<h3 class="sec">${t.secStays}</h3>${body}`;
  }

  // Spoiler <details> per i voli da aeroporti alternativi;
  // si auto-apre quando il membro selezionato parte da lì (open impostato a ogni render)
  function extraOriginsBlock(ev) {
    const list = ev.extra_origins || [];
    if (!list.length) return "";
    return list.map(o => {
      if (!(o.flights || []).length)
        return `<div class="extra-none">${esc(t.extraNone(airportLabel(o.origin)))}</div>`;
      const mine = !!state.member && (o.participants || []).includes(state.member);
      const who = (o.participants || []).join(", ");
      return `<details class="extra-origin${mine ? " me" : ""}"${mine ? " open" : ""}>
        <summary><span class="chev">▾</span>✈ ${esc(t.flightsFrom)} ${esc(airportLabel(o.origin))}${who ? ` ${esc(t.forWord)} ${esc(who)}` : ""}</summary>
        <div class="extra-body">${legsHtml(o.flights, o.return_flights, ev, null)}</div>
      </details>`;
    }).join("");
  }

  function searchLinks(links) {
    const l = links || {};
    const btn = (url, label) => url ? `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(label)}</a>` : "";
    return `<div class="noprices">${esc(t.noPrices)}</div>
      <div class="linkrow">
        ${btn(l.booking, t.searchBooking)}
        ${btn(l.airbnb, t.searchAirbnb)}
        ${btn(l.flights, t.searchFlights)}
      </div>`;
  }

  function eventCard(ev, isNext) {
    const est = estimateFor(ev, state.member);
    const d = state.deltas[ev.slug] || {};
    const hasPrices = (ev.flights && ev.flights.length) || (ev.stays && ev.stays.length);
    const parts = ev.participants || [];

    return `<article class="card">
      <div class="card-head">
        <h2>${esc(ev.name)}</h2>
        ${isNext ? `<span class="badge next">${esc(t.nextBadge)}</span>` : ""}
        <span class="badge ${esc(ev.type)}">${t.types[ev.type] || esc(ev.type)}</span>
      </div>
      <div class="meta">
        <div>📍 ${esc(ev.city)}, ${esc(ev.country)} · ${fmtRange(ev.start, ev.end)}</div>
        <div>🏟 ${esc(ev.venue)}${ev.venue_confirmed === false ? ` <span class="venue-warn">⚠ ${esc(t.venueTBC)}</span>` : ""}</div>
        <div>🛏 ${ev.nights} ${t.nightsWord(ev.nights)} · check-in ${fmtDay(parseDay(ev.check_in))} → check-out ${fmtDay(parseDay(ev.check_out))}</div>
      </div>

      <div class="who">
        ${parts.length
          ? `${esc(t.booked(parts.length))} ${parts.map(p =>
              `<span class="chip${p === state.member ? " me" : ""}">${esc(p)}</span>`).join("")}`
          : `<span class="none">${esc(t.noneBooked(ev.people_for_search || 4))}</span>`}
      </div>

      <div class="estimate">
        <span class="lbl">${esc(t.estimateLbl)}${state.member ? esc(t.forName(state.member)) : ""}</span>
        <span class="big">${euro(est.total)}</span>
        ${est.total != null
          ? `<span class="split">${esc(t.flightWord)}${est.origin ? " " + esc(t.fromWord) + " " + esc(airportLabel(est.origin)) : ""} ${euro(est.flight)} + ${esc(t.stayWord)} ${euro(est.stay)}</span>` : ""}
        ${deltaChip(d.flight, t.deltaFlight)}
        ${deltaChip(d.stay, t.deltaNight)}
      </div>

      ${hasPrices ? `
        ${ev.flights && ev.flights.length ? flightsBlock(ev) : ""}
        ${extraOriginsBlock(ev)}
        ${staysSection(ev)}
      ` : searchLinks(ev.links) + extraOriginsBlock(ev)}

      ${ev.errors && ev.errors.length
        ? `<div class="errors">${esc(t.errorsLbl)} ${ev.errors.map(esc).join(" · ")}</div>` : ""}
    </article>`;
  }

  // ---- filtri, stat tiles e lista ----
  const FILTERS = {
    all:    () => true,
    intl:   e => e.type === "international",
    eu:     e => e.type === "regional" || e.type === "special",
    booked: e => (e.participants || []).length > 0,
  };

  function refresh() {
    const shown = state.events
      .filter(FILTERS[state.typeFilter] || FILTERS.all)
      .filter(e => !state.member || (e.participants || []).includes(state.member));

    const today = new Date(); today.setHours(0, 0, 0, 0);
    const next = shown.find(e => parseDay(e.start) >= today);

    // stat tiles sugli eventi visibili (prezzi personalizzati per membro)
    let fSum = 0, fN = 0, sSum = 0, sN = 0, tSum = 0, tN = 0;
    for (const ev of shown) {
      const e = estimateFor(ev, state.member);
      if (e.flight != null) { fSum += e.flight; fN++; }
      if (e.stay != null)   { sSum += e.stay;   sN++; }
      if (e.total != null)  { tSum += e.total;  tN++; }
    }
    const tile = (label, sum, n) => `<div class="tile">
      <div class="k">${esc(label)}</div>
      <div class="v">${n ? euro(round2(sum)) : "—"}</div>
      <div class="n">${esc(t.ofEvents(n))}</div></div>`;

    document.getElementById("summary").innerHTML = `
      <div class="sumline">${shown.length} ${esc(t.eventsWord(shown.length))}${next
        ? ` · ${esc(t.nextWord)}: ${esc(next.city)} · ${fmtDay(parseDay(next.start))}` : ""}</div>
      <div class="tiles">
        ${tile(t.tileFlights, fSum, fN)}
        ${tile(t.tileStays, sSum, sN)}
        ${tile(t.tileTotal, tSum, tN)}
      </div>`;

    document.getElementById("cards").innerHTML = shown.length
      ? shown.map(e => eventCard(e, e === next)).join("")
      : `<div class="empty">${esc(t.emptyFilter)}</div>`;
  }

  // Testi statici (header, filtri, chip, footer) nel locale attivo
  function applyStatic() {
    document.title = t.title;
    if (document.documentElement) document.documentElement.lang = state.lang;
    document.getElementById("title").textContent = t.title;

    const gen = state.generatedAt ? new Date(state.generatedAt) : null;
    const genTxt = gen && !isNaN(gen)
      ? gen.toLocaleString(t.locale, { dateStyle: "long", timeStyle: "short" }) : "—";
    document.getElementById("subheader").textContent = t.updated(genTxt, airportLabel(state.origin));

    const banner = document.getElementById("banner");
    banner.hidden = !state.isSample;
    if (state.isSample) banner.textContent = t.sampleBanner;

    const labels = { all: t.fAll, intl: t.fIntl, eu: t.fEu, booked: t.fBooked };
    document.querySelectorAll("#filters button").forEach(b => {
      b.textContent = labels[b.dataset.f] || "";
    });

    document.getElementById("member-label").textContent = t.viewAs;
    const sel = document.getElementById("member");
    if (sel.options.length) sel.options[0].textContent = t.everyone;
    document.getElementById("mobile-toggle").textContent = t.mobileChip;
    document.getElementById("genius-toggle").textContent = t.geniusChip;
    document.getElementById("footer").textContent = t.footer;
  }

  // Nomi per il selettore "Vedi come…": team fisso + eventuali nomi extra nei dati
  function memberNames(events) {
    const names = new Set(TEAM);
    for (const e of events) {
      (e.participants || []).forEach(n => names.add(n));
      (e.extra_origins || []).forEach(o => (o.participants || []).forEach(n => names.add(n)));
    }
    const extra = [...names].filter(n => !TEAM.includes(n)).sort((a, b) => a.localeCompare(b, "it"));
    return [...TEAM, ...extra];
  }

  // ---- avvio ----
  async function init() {
    try { setLang(localStorage.getItem(LS_LANG) || "it"); } catch (_) { setLang("it"); }

    let data;
    try {
      data = await loadJSON("./data/prices.json");
    } catch (_) {
      try {
        data = await loadJSON("./data/prices.sample.json");
        state.isSample = true;
      } catch (e2) {
        applyStatic();
        document.getElementById("cards").innerHTML =
          `<div class="fatal">${esc(t.fatal(e2.message))}</div>`;
        return;
      }
    }

    let history = null;
    try { history = await loadJSON("./data/history.json"); } catch (_) { /* opzionale */ }
    state.deltas = computeDeltas(history);
    state.generatedAt = data.generated_at || null;
    state.origin = data.origin || "";
    state.events = [...(data.events || [])].sort((a, b) => (a.start < b.start ? -1 : 1));

    // selettore membro, con scelta persistita in localStorage
    const sel = document.getElementById("member");
    for (const n of memberNames(state.events)) {
      const opt = document.createElement("option");
      opt.value = n; opt.textContent = n;
      sel.appendChild(opt);
    }
    try { state.member = localStorage.getItem(LS_MEMBER) || ""; } catch (_) {}
    if (state.member && ![...sel.options].some(o => o.value === state.member)) state.member = "";
    sel.value = state.member;

    // listeners
    document.getElementById("filters").addEventListener("click", e => {
      const btn = e.target.closest("button[data-f]");
      if (!btn) return;
      state.typeFilter = btn.dataset.f;
      document.querySelectorAll("#filters button").forEach(x => x.classList.toggle("active", x === btn));
      refresh();
    });

    sel.addEventListener("change", () => {
      state.member = sel.value;
      try { localStorage.setItem(LS_MEMBER, state.member); } catch (_) {}
      refresh();
    });

    document.getElementById("lang").addEventListener("click", e => {
      const btn = e.target.closest("button[data-l]");
      if (!btn || btn.dataset.l === state.lang) return;
      setLang(btn.dataset.l);
      try { localStorage.setItem(LS_LANG, state.lang); } catch (_) {}
      document.querySelectorAll("#lang button").forEach(x => x.classList.toggle("active", x.dataset.l === state.lang));
      applyStatic();
      refresh();
    });

    const mob = document.getElementById("mobile-toggle");
    mob.addEventListener("click", () => {
      state.mobileOnly = !state.mobileOnly;
      mob.classList.toggle("active", state.mobileOnly);
      refresh();
    });

    // chip Genius: visibile solo se almeno un alloggio nel dataset ha genius_deal
    const gnb = document.getElementById("genius-toggle");
    const anyGenius = state.events.some(ev => (ev.stays || []).some(s => s.genius_deal === true));
    gnb.hidden = !anyGenius;
    gnb.addEventListener("click", () => {
      state.geniusOnly = !state.geniusOnly;
      gnb.classList.toggle("active", state.geniusOnly);
      refresh();
    });

    document.querySelectorAll("#lang button").forEach(x => x.classList.toggle("active", x.dataset.l === state.lang));
    applyStatic();
    refresh();
  }

  init();
})();
</script>
</body>
</html>
